<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make & Munch | Contact</title>

    <!-- CSS Link same as index.html -->
     <link rel="stylesheet" href="build_setup.css">
</head>
<!-- full copy of index.html-->
<body>
<header class="site-header">
    <div class="header-inner">
        <h1 class="site-title">Make & Munch</h1>

        <div class="tagline-wrap">
            <hr class="decor-line">
            <p class="site-tagline">Where Tradition Meets Every Bite</p>
            <hr class="decor-line">
        </div>
    </div>
</header>

<main class="main-content">
    <section class="contact-section">
        <h2 class="section-title">Contact</h2>

        <a href="index.html" class="btn">Back to Home</a>

        <p class="contact-text">At Make & Munch we love sharing homemade recipes and kitchen ideas. 
            If you have a favorite dish or a question about one of our recipes, feel free to reach out!
        </p>

        <form class="contact-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="text" id="email" name="email" required>

            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" required>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>
</main>

<footer class="site-footer">
    <p class="footer-text">© 2026 Make & Munch • Where Tradition Meets Every Bite</p>
</footer>

</body>
</html>
